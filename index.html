<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector Racer: Grand Prix</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="cac6a14a-eb4d-422d-8920-e30b8ca96eac"></script>
</head>
<body>

    <header>
        <h1>Vector <span>Grand Prix</span></h1>
        
        <div class="header-right">
            <!-- Stats moved outside controls so they stay visible -->
            <div class="stats">
                <div class="stat-item">LAP: <span id="time-val">0.00</span></div>
                <div class="stat-item">KPH: <span id="speed-val">0</span></div>
                <div class="stat-item" id="best-time-display" style="display: none;">BEST: <span id="best-time-val">--</span></div>
            </div>

            <!-- Hamburger Button -->
            <button id="menu-toggle">☰</button>

            <!-- Collapsible Controls -->
            <div class="header-controls" id="header-controls">
                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="toggle-route" checked> Trace Route
                    </label>
                    <label>
                        <input type="checkbox" id="toggle-vector"> Show Vector
                    </label>
                    <label>
                        <input type="checkbox" id="toggle-camera"> Dynamic Cam
                    </label>
                </div>
                <select id="track-select">
                    <option value="circuit">Classic Circuit</option>
                    <option value="monza">Temple of Speed</option>
                    <option value="silverstone">Royal Circuit</option>
                    <option value="spa">Forest Run</option>
                    <option value="oval">Super Oval</option>
                    <option value="complex">The Complex</option>
                </select>
            </div>
        </div>
    </header>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="key-hint">
            A / D or Arrows to Steer
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-overlay">
            <button id="start-btn" data-umami-event="start-race">Start Your Engines</button>
        </div>

        <!-- F1 Lights (3 Steps) -->
        <div id="start-lights">
            <div class="light" id="light-1"></div>
            <div class="light" id="light-2"></div>
            <div class="light" id="light-3"></div>
        </div>
        
        <!-- Big GO Text -->
        <div id="go-message">GO!</div>

        <!-- Mobile Touch Controls (Steering Only) -->
        <div class="mobile-controls">
            <div class="control-group">
                <div id="btn-left" class="touch-btn">←</div>
                <div id="btn-right" class="touch-btn">→</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="restart-btn" class="danger" title="Restart Track">Restart</button>
    </div>

    <div id="modal" class="modal">
        <h2 id="modal-title">CRASH</h2>
        <p id="modal-msg">Terminal Damage</p>
        <div id="modal-lap-times" class="modal-lap-times"></div>
        <button id="modal-reset-btn" data-umami-event="restart-race">Box Box</button>
        
        <div class="modal-track-selector">
            <label>Next Grand Prix</label>
            <select id="modal-track-select">
                <option value="circuit">Classic Circuit</option>
                <option value="monza">Temple of Speed</option>
                <option value="silverstone">Royal Circuit</option>
                <option value="spa">Forest Run</option>
                <option value="oval">Super Oval</option>
                <option value="complex">The Complex</option>
            </select>
        </div>
    </div>

    <script type="module" src="game/index.js"></script>
</body>
</html>
