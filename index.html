<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector Racer: Grand Prix</title>
    <style>
        :root {
            --bg-color: #0f172a; /* Dark background */
            --text-color: #f8fafc;
            --accent-color: #ef4444; /* Racing Red */
            --danger-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none; /* iOS Safari */
        }

        header {
            width: 100%;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #020617;
            border-bottom: 2px solid var(--accent-color);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #fff;
            text-transform: uppercase;
            font-style: italic;
        }

        h1 span {
            color: var(--accent-color);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        select {
            background-color: #1e293b;
            color: var(--text-color);
            border: 1px solid #334155;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            font-weight: 600;
        }

        select:hover {
            border-color: var(--accent-color);
        }

        .stats {
            display: flex;
            gap: 1.5rem;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            background: #000;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid #334155;
        }

        .stat-item span {
            color: var(--accent-color);
            font-weight: bold;
        }

        #game-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #0f172a;
            touch-action: none; /* Prevent browser handling gestures */
        }

        canvas {
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Desktop Controls (Restart Button) */
        .controls {
            position: absolute;
            bottom: 2rem;
            display: flex;
            gap: 1rem;
            z-index: 20;
        }

        button {
            background-color: #334155;
            color: var(--text-color);
            border: none;
            border-bottom: 3px solid #1e293b;
            padding: 0.75rem 1.5rem;
            border-radius: 0.25rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        button:hover {
            background-color: var(--accent-color);
            border-bottom-color: #991b1b;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(2px);
            border-bottom-width: 0;
        }

        button.danger {
            background-color: #7f1d1d;
            border-bottom-color: #450a0a;
        }

        button.danger:hover {
            background-color: #ef4444;
        }

        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal h2 {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            color: #fff;
            text-transform: uppercase;
            font-style: italic;
            font-weight: 900;
        }

        .modal p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-family: 'Courier New', monospace;
            color: var(--accent-color);
        }

        .tutorial {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--accent-color);
            padding: 1rem 2rem;
            border-radius: 4px;
            pointer-events: none;
            transition: opacity 0.5s;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .hidden {
            opacity: 0;
        }

        .key-hint {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            text-align: right;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1rem; display: none; }
            .header-controls { gap: 0.5rem; width: 100%; justify-content: space-between; }
            
            .key-hint {
                display: none;
            }
            /* Reposition Restart Button for Mobile */
            .controls {
                bottom: auto;
                top: 80px;
                right: 20px;
                left: auto;
                z-index: 25;
            }
            .controls button {
                padding: 0.5rem 1rem;
                font-size: 0.7rem;
                opacity: 0.8;
            }
            .tutorial {
                font-size: 0.9rem;
                padding: 0.8rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Vector <span>Grand Prix</span></h1>
        <div class="header-controls">
            <select id="track-select">
                <option value="circuit">Classic Circuit</option>
                <option value="monza">Temple of Speed</option>
                <option value="oval">Super Oval</option>
                <option value="complex">The Complex</option>
            </select>
            <div class="stats">
                <div class="stat-item">LAP: <span id="time-val">0.00</span></div>
                <div class="stat-item">KPH: <span id="speed-val">0</span></div>
            </div>
        </div>
    </header>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="tutorial-msg" class="tutorial">Touch & Drag to Drive</div>
        <div class="key-hint">
            WASD / ARROWS
        </div>
    </div>

    <div class="controls">
        <button class="danger" onclick="game.reset()" title="Restart Track">Restart</button>
    </div>

    <div id="modal" class="modal">
        <h2 id="modal-title">CRASH</h2>
        <p id="modal-msg">Terminal Damage</p>
        <button onclick="game.reset()">Box Box</button>
    </div>

    <script>
        // --- Geometry & Math Helpers ---
        const Point = (x, y) => ({ x, y });
        
        function getIntersection(A, B, C, D) {
            const tTop = (D.x - C.x) * (A.y - C.y) - (D.y - C.y) * (A.x - C.x);
            const uTop = (C.y - A.y) * (A.x - B.x) - (C.x - A.x) * (A.y - B.y);
            const bottom = (D.y - C.y) * (B.x - A.x) - (D.x - C.x) * (B.y - A.y);

            if (bottom !== 0) {
                const t = tTop / bottom;
                const u = uTop / bottom;
                if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
                    return Point(
                        C.x + (D.x - C.x) * u,
                        C.y + (D.y - C.y) * u
                    );
                }
            }
            return null;
        }

        // --- Game Config ---
        const CONFIG = {
            gridSize: 40, 
            
            // Environment Colors
            offTrackColor: '#0f172a', // Deep Blue/Grey for runoff areas
            trackColor: '#334155',    // Lighter Slate for Asphalt
            
            // F1 Style Colors
            curbRed: '#ef4444',
            curbWhite: '#f8fafc',
            
            carColor: '#ef4444', 
            carAccent: '#171717',
            
            skidColor: 'rgba(0,0,0,0.4)',
            smokeColor: 'rgba(200,200,200,0.4)',
            sparkColor: '#fcd34d',
            
            finishLineColor: '#fff',
            
            // Physics Constants
            accel: 20.0, 
            turnSpeed: 4.0,  
            friction: 0.96, 
            crashSpeed: 4.5,
            
            // Collision radius (approximate car half-width in grid units)
            carRadius: 0.25 
        };

        // --- Track Definitions ---
        const TRACKS = {
            circuit: {
                name: "Classic Circuit",
                outer: [
                    Point(2, 2), Point(15, 2), Point(20, 5), Point(25, 5), 
                    Point(30, 8), Point(30, 15), Point(25, 20), Point(10, 20),
                    Point(5, 15), Point(2, 10)
                ],
                inner: [
                    Point(6, 6), Point(13, 6), Point(16, 8), Point(22, 8),
                    Point(24, 10), Point(24, 13), Point(20, 16), Point(10, 16),
                    Point(8, 13), Point(6, 10)
                ],
                startLine: { p1: Point(10, 2), p2: Point(10, 6) },
                startPos: Point(8, 4),
                startAngle: 0
            },
            monza: {
                name: "Temple of Speed",
                outer: [
                    Point(10, 30), // Finish Line
                    Point(40, 30), // Main Straight
                    Point(43, 27), // T1 Entry
                    Point(45, 29), // T1 Exit
                    Point(50, 29), // Curva Grande Entry
                    Point(55, 20), // Curva Grande Apex
                    Point(55, 12), // Curva Grande Exit
                    Point(53, 9),  // Roggia Entry
                    Point(50, 7),  // Roggia Mid
                    Point(47, 9),  // Roggia Exit
                    Point(40, 5),  // Lesmo 1
                    Point(30, 5),  // Lesmo 2
                    Point(20, 5),  // Serraglio
                    Point(15, 3),  // Ascari Entry
                    Point(12, 7),  // Ascari Mid
                    Point(9, 5),   // Ascari Exit
                    Point(5, 15),  // Back Straight
                    Point(5, 25)   // Parabolica Entry
                ],
                inner: [
                    Point(10, 26), 
                    Point(38, 26), 
                    Point(41, 23), 
                    Point(45, 25), 
                    Point(48, 25), 
                    Point(51, 20), 
                    Point(51, 14), 
                    Point(50, 12),
                    Point(50, 10), 
                    Point(47, 12),
                    Point(40, 9), 
                    Point(30, 9), 
                    Point(20, 9), 
                    Point(17, 7), 
                    Point(13, 10), 
                    Point(10, 9), 
                    Point(9, 15), 
                    Point(9, 22)
                ],
                startLine: { p1: Point(15, 25), p2: Point(15, 31) },
                startPos: Point(12, 28),
                startAngle: 0
            },
            oval: {
                name: "Super Oval",
                outer: [
                    Point(5, 5), Point(25, 5), Point(35, 15), Point(25, 25),
                    Point(5, 25), Point(-5, 15)
                ],
                inner: [
                    Point(8, 10), Point(22, 10), Point(25, 15), Point(22, 20),
                    Point(8, 20), Point(5, 15)
                ],
                startLine: { p1: Point(15, 5), p2: Point(15, 10) },
                startPos: Point(12, 7.5),
                startAngle: 0
            },
            complex: {
                name: "The Complex",
                outer: [
                    Point(2, 2), 
                    Point(20, 2), 
                    Point(30, 2), Point(35, 10), Point(30, 25), 
                    Point(20, 25), Point(15, 23), Point(10, 25), 
                    Point(2, 20), Point(0, 10)
                ],
                inner: [
                    Point(6, 6), 
                    Point(15, 8), 
                    Point(25, 6), Point(28, 10), Point(25, 20), 
                    Point(20, 20), 
                    Point(15, 18), 
                    Point(10, 20), Point(6, 15),
                    Point(4, 10)
                ],
                startLine: { p1: Point(8, 2), p2: Point(8, 6) },
                startPos: Point(5, 4),
                startAngle: 0
            }
        };

        // --- Game Engine ---
        class RealTimeRacer {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.container = document.getElementById('game-container');
                this.trackSelect = document.getElementById('track-select');
                
                // Generate Internal Car Sprite
                this.carSprite = this.createCarSprite();
                
                // Physics State
                this.currentTrack = TRACKS.circuit; 
                this.pos = { ...this.currentTrack.startPos };
                this.velocity = { x: 0, y: 0 };
                this.angle = this.currentTrack.startAngle;
                
                // Active Geometry (Smoothed)
                this.activeGeometry = { outer: [], inner: [] };

                // Game State
                this.status = 'ready'; 
                this.startTime = 0;
                this.currentTime = 0;
                
                // Visuals
                this.skidMarks = [];
                this.particles = [];

                // Input
                this.keys = { up: false, down: false, left: false, right: false };
                
                // Viewport
                this.camera = { x: 0, y: 0 };
                
                // DOM
                this.uiTime = document.getElementById('time-val');
                this.uiSpeed = document.getElementById('speed-val');
                this.modal = document.getElementById('modal');
                this.modalTitle = document.getElementById('modal-title');
                this.modalMsg = document.getElementById('modal-msg');
                this.tutorial = document.getElementById('tutorial-msg');

                // Listeners
                window.addEventListener('resize', () => this.resize());
                window.addEventListener('keydown', (e) => this.handleKey(e, true));
                window.addEventListener('keyup', (e) => this.handleKey(e, false));
                this.trackSelect.addEventListener('change', (e) => this.loadTrack(e.target.value));
                
                // Mobile Control Bindings
                this.bindMobileControls();

                this.resize();
                this.loadTrack('circuit');
                
                this.lastTime = performance.now();
                this.loop(this.lastTime);
            }

            bindMobileControls() {
                const touchZone = document.getElementById('game-container');
                let startX = 0;
                let isTouching = false;

                const handleTouch = (e) => {
                    e.preventDefault(); // Prevent scrolling/zooming
                    
                    if (e.type === 'touchstart') {
                        const touch = e.touches[0];
                        startX = touch.clientX;
                        isTouching = true;
                        this.keys.up = true; // Auto-accelerate on touch
                        
                        // Auto-start game
                        if (this.status === 'ready') {
                            this.status = 'playing';
                            this.startTime = performance.now();
                            this.tutorial.classList.add('hidden');
                        }
                    } else if (e.type === 'touchmove' && isTouching) {
                        const touch = e.touches[0];
                        const currentX = touch.clientX;
                        const diff = currentX - startX;
                        const threshold = 20; // Sensitivity deadzone

                        if (diff < -threshold) {
                            this.keys.left = true;
                            this.keys.right = false;
                        } else if (diff > threshold) {
                            this.keys.right = true;
                            this.keys.left = false;
                        } else {
                            this.keys.left = false;
                            this.keys.right = false;
                        }
                    } else if (e.type === 'touchend' || e.type === 'touchcancel') {
                        isTouching = false;
                        this.keys.up = false;
                        this.keys.left = false;
                        this.keys.right = false;
                    }
                };

                touchZone.addEventListener('touchstart', handleTouch, { passive: false });
                touchZone.addEventListener('touchmove', handleTouch, { passive: false });
                touchZone.addEventListener('touchend', handleTouch, { passive: false });
                touchZone.addEventListener('touchcancel', handleTouch, { passive: false });
            }

            // Create F1 Car Sprite
            createCarSprite() {
                const c = document.createElement('canvas');
                c.width = 64;
                c.height = 32;
                const x = c.getContext('2d');
                x.translate(32, 16);
                
                // Tires
                x.fillStyle = '#171717';
                x.fillRect(6, -12, 10, 6); x.fillRect(6, 6, 10, 6);
                x.fillRect(-16, -13, 11, 7); x.fillRect(-16, 6, 11, 7);
                // Shine
                x.fillStyle = '#333';
                x.fillRect(8, -11, 4, 2); x.fillRect(8, 7, 4, 2);
                x.fillRect(-14, -12, 6, 2); x.fillRect(-14, 7, 6, 2);
                // Front Wing
                x.fillStyle = '#e2e8f0';
                x.beginPath(); x.moveTo(18, -10); x.lineTo(18, 10); x.lineTo(14, 8); x.lineTo(14, -8); x.fill();
                // Body
                x.fillStyle = '#dc2626'; 
                x.beginPath(); x.moveTo(20, 0); x.lineTo(6, -3); x.lineTo(-6, -6); 
                x.lineTo(-12, -6); x.lineTo(-14, -2); x.lineTo(-14, 2); x.lineTo(-12, 6);
                x.lineTo(-6, 6); x.lineTo(6, 3); x.closePath(); x.fill();
                // Intakes
                x.fillStyle = '#000';
                x.beginPath(); x.moveTo(0, -4); x.lineTo(-4, -6); x.lineTo(0, -6); x.fill();
                x.beginPath(); x.moveTo(0, 4); x.lineTo(-4, 6); x.lineTo(0, 6); x.fill();
                // Rear Wing
                x.fillStyle = '#111'; x.fillRect(-18, -10, 4, 20);
                x.fillStyle = '#dc2626'; x.fillRect(-18, -10, 5, 2); x.fillRect(-18, 8, 5, 2);
                // Helmet
                x.fillStyle = '#facc15'; x.beginPath(); x.arc(-4, 0, 3, 0, Math.PI*2); x.fill();
                // Stripe
                x.fillStyle = '#fff'; x.fillRect(-10, -1, 12, 2);
                return c;
            }

            resize() {
                this.canvas.width = this.container.clientWidth;
                this.canvas.height = this.container.clientHeight;
            }
            
            // Helper to round corners
            smoothPoly(points, radius) {
                // Filter out duplicate adjacent points to prevent Divide-by-Zero
                const uniquePoints = points.filter((p, i) => {
                    const next = points[(i + 1) % points.length];
                    return !(Math.abs(p.x - next.x) < 0.01 && Math.abs(p.y - next.y) < 0.01);
                });

                if (uniquePoints.length < 3) return uniquePoints;

                const newPoints = [];
                const len = uniquePoints.length;
                
                for (let i = 0; i < len; i++) {
                    const prev = uniquePoints[(i - 1 + len) % len];
                    const curr = uniquePoints[i];
                    const next = uniquePoints[(i + 1) % len];

                    // Edge vectors
                    const v1 = { x: curr.x - prev.x, y: curr.y - prev.y };
                    const v2 = { x: next.x - curr.x, y: next.y - curr.y };
                    
                    const len1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
                    const len2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);
                    
                    // Safety check
                    if (len1 < 0.001 || len2 < 0.001) {
                        newPoints.push(curr);
                        continue;
                    }

                    // Constrain radius
                    const r = Math.min(radius, len1/2.5, len2/2.5);
                    
                    // Normalize
                    const n1 = { x: v1.x/len1, y: v1.y/len1 };
                    const n2 = { x: v2.x/len2, y: v2.y/len2 };
                    
                    // Start/End of curve
                    const start = { x: curr.x - n1.x * r, y: curr.y - n1.y * r };
                    const end   = { x: curr.x + n2.x * r, y: curr.y + n2.y * r };
                    
                    // Interpolate Curve (Quadratic Bezier)
                    const steps = 5;
                    for(let t=0; t<=steps; t++) {
                        const s = t/steps;
                        const a = (1-s)*(1-s);
                        const b = 2*(1-s)*s;
                        const c = s*s;
                        
                        newPoints.push({
                            x: a*start.x + b*curr.x + c*end.x,
                            y: a*start.y + b*curr.y + c*end.y
                        });
                    }
                }
                return newPoints;
            }

            loadTrack(trackKey) {
                if (TRACKS[trackKey]) {
                    this.currentTrack = TRACKS[trackKey];
                    // Generate smoothed geometry
                    const cornerRadius = 3; 
                    this.activeGeometry.outer = this.smoothPoly(this.currentTrack.outer, cornerRadius);
                    this.activeGeometry.inner = this.smoothPoly(this.currentTrack.inner, cornerRadius);
                    
                    this.reset();
                    document.activeElement.blur(); 
                }
            }

            handleKey(e, isDown) {
                // Ignore key events if no valid key property (can happen with manual triggers)
                if (!e.key) return;

                if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(e.code) > -1) {
                    // Only prevent default on actual keyboard events, not our synthetic objects
                    if (e.preventDefault) e.preventDefault();
                }
                switch(e.key.toLowerCase()) {
                    case 'w': case 'arrowup': this.keys.up = isDown; break;
                    case 's': case 'arrowdown': this.keys.down = isDown; break;
                    case 'a': case 'arrowleft': this.keys.left = isDown; break;
                    case 'd': case 'arrowright': this.keys.right = isDown; break;
                }
                if (isDown && this.status === 'ready' && (this.keys.up || this.keys.down)) {
                    this.status = 'playing';
                    this.startTime = performance.now();
                    this.tutorial.classList.add('hidden');
                }
            }

            update(dt) {
                if (this.status === 'playing') {
                    // Physics
                    let ax = 0;
                    let ay = 0;

                    if (this.keys.up) {
                        ax += Math.cos(this.angle) * CONFIG.accel;
                        ay += Math.sin(this.angle) * CONFIG.accel;
                    }
                    if (this.keys.down) {
                        ax -= Math.cos(this.angle) * (CONFIG.accel * 0.8);
                        ay -= Math.sin(this.angle) * (CONFIG.accel * 0.8);
                        if(Math.random() > 0.5) this.spawnParticles('smoke');
                    }

                    if (this.keys.left) this.angle -= CONFIG.turnSpeed * dt;
                    if (this.keys.right) this.angle += CONFIG.turnSpeed * dt;

                    this.velocity.x += ax * dt;
                    this.velocity.y += ay * dt;
                    this.velocity.x *= CONFIG.friction;
                    this.velocity.y *= CONFIG.friction;

                    const nextPos = {
                        x: this.pos.x + this.velocity.x * dt,
                        y: this.pos.y + this.velocity.y * dt
                    };

                    // Check Collision
                    const hitWall = this.checkWallCollision(this.pos, nextPos);
                    
                    if (hitWall) {
                        const speed = Math.sqrt(this.velocity.x**2 + this.velocity.y**2);
                        if (speed > CONFIG.crashSpeed) {
                            this.status = 'crashed';
                            this.showModal('CRASHED', `Impact: ${Math.round(speed*20)} KPH`);
                            for(let k=0; k<20; k++) this.spawnParticles('spark');
                        } else {
                            // Wall Scrape
                            this.velocity.x *= -0.5;
                            this.velocity.y *= -0.5;
                            this.pos.x -= this.velocity.x * dt * 2;
                            this.pos.y -= this.velocity.y * dt * 2;
                            for(let k=0; k<5; k++) this.spawnParticles('spark');
                        }
                    } else {
                        if (this.checkFinishLine(this.pos, nextPos)) this.handleWin();
                        this.pos = nextPos;
                    }

                    this.currentTime = (performance.now() - this.startTime) / 1000;

                    // Skid marks
                    const speed = Math.sqrt(this.velocity.x**2 + this.velocity.y**2);
                    const vx = Math.cos(this.angle);
                    const vy = Math.sin(this.angle);
                    const vMag = speed || 1;
                    const vNormX = this.velocity.x / vMag;
                    const vNormY = this.velocity.y / vMag;
                    
                    const slip = 1 - (vx * vNormX + vy * vNormY);
                    
                    if ((slip > 0.05 && speed > 2) || (this.keys.down && speed > 1)) {
                        this.skidMarks.push({
                            x: this.pos.x, 
                            y: this.pos.y, 
                            angle: this.angle,
                            alpha: 1.0
                        });
                        if (this.skidMarks.length > 200) this.skidMarks.shift();
                    }
                }

                // Update Particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            spawnParticles(type) {
                const count = type === 'spark' ? 5 : 1;
                for(let i=0; i<count; i++) {
                    const spread = 0.5;
                    const px = this.pos.x + (Math.random() - 0.5) * spread;
                    const py = this.pos.y + (Math.random() - 0.5) * spread;
                    
                    let pvX, pvY, color, life;
                    
                    if (type === 'spark') {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 2 + Math.random() * 5;
                        pvX = Math.cos(angle) * speed;
                        pvY = Math.sin(angle) * speed;
                        color = CONFIG.sparkColor;
                        life = 0.2 + Math.random() * 0.2;
                    } else {
                        // Smoke
                        pvX = (Math.random()-0.5) * 2;
                        pvY = (Math.random()-0.5) * 2;
                        color = CONFIG.smokeColor;
                        life = 0.5 + Math.random() * 0.5;
                    }

                    this.particles.push({
                        x: px, y: py,
                        vx: pvX, vy: pvY,
                        life: life,
                        maxLife: life,
                        color: color,
                        size: type === 'spark' ? 2 : 4
                    });
                }
            }

            checkWallCollision(p1, p2) {
                const checkPoly = (poly) => {
                    for (let i = 0; i < poly.length; i++) {
                        const w1 = poly[i];
                        const w2 = poly[(i + 1) % poly.length];
                        
                        if (getIntersection(p1, p2, w1, w2)) return true;
                        
                        const A = p2.x - w1.x;
                        const B = p2.y - w1.y;
                        const C = w2.x - w1.x;
                        const D = w2.y - w1.y;

                        const dot = A * C + B * D;
                        const lenSq = C * C + D * D;
                        let param = -1;
                        if (lenSq !== 0) param = dot / lenSq;

                        let xx, yy;

                        if (param < 0) {
                            xx = w1.x; yy = w1.y;
                        } else if (param > 1) {
                            xx = w2.x; yy = w2.y;
                        } else {
                            xx = w1.x + param * C;
                            yy = w1.y + param * D;
                        }

                        const dx = p2.x - xx;
                        const dy = p2.y - yy;
                        if ((dx * dx + dy * dy) < (CONFIG.carRadius * CONFIG.carRadius)) {
                            return true;
                        }
                    }
                    return false;
                };
                if (checkPoly(this.activeGeometry.outer)) return true;
                if (checkPoly(this.activeGeometry.inner)) return true;
                return false;
            }

            checkFinishLine(p1, p2) {
                if (this.currentTime < 5.0) return false;
                const line = this.currentTrack.startLine;
                return !!getIntersection(p1, p2, line.p1, line.p2);
            }

            handleWin() {
                this.status = 'won';
                const finalTime = this.currentTime.toFixed(2);
                this.showModal('POLE POSITION', `Lap Time: ${finalTime}s`);
            }

            reset() {
                this.pos = { ...this.currentTrack.startPos };
                this.velocity = { x: 0, y: 0 };
                this.angle = this.currentTrack.startAngle;
                this.keys = { up: false, down: false, left: false, right: false };
                this.status = 'ready';
                this.currentTime = 0;
                this.skidMarks = [];
                this.particles = [];
                this.modal.classList.remove('active');
                this.tutorial.classList.remove('hidden');
                this.uiTime.innerText = "0.00";
                this.uiSpeed.innerText = "0";
                
                const cw = this.canvas.width;
                const ch = this.canvas.height;
                const gs = CONFIG.gridSize;
                this.camera.x = (this.pos.x * gs) - cw/2;
                this.camera.y = (this.pos.y * gs) - ch/2;
            }

            showModal(title, msg) {
                this.modalTitle.innerText = title;
                this.modalMsg.innerText = msg;
                this.modal.classList.add('active');
            }

            render() {
                const ctx = this.ctx;
                const cw = this.canvas.width;
                const ch = this.canvas.height;
                const gs = CONFIG.gridSize;

                // 1. Fill Off-Track
                ctx.fillStyle = CONFIG.offTrackColor;
                ctx.fillRect(0, 0, cw, ch);

                // 2. Camera Update
                const targetCamX = this.pos.x * gs - cw / 2;
                const targetCamY = this.pos.y * gs - ch / 2;
                this.camera.x += (targetCamX - this.camera.x) * 0.1;
                this.camera.y += (targetCamY - this.camera.y) * 0.1;

                ctx.save();
                ctx.translate(-this.camera.x, -this.camera.y);

                // 3. Draw Track Surface
                ctx.beginPath();
                const outer = this.activeGeometry.outer;
                ctx.moveTo(outer[0].x * gs, outer[0].y * gs);
                for(let i=1; i<outer.length; i++) ctx.lineTo(outer[i].x * gs, outer[i].y * gs);
                ctx.closePath();
                const inner = this.activeGeometry.inner;
                ctx.moveTo(inner[0].x * gs, inner[0].y * gs);
                for(let i=1; i<inner.length; i++) ctx.lineTo(inner[i].x * gs, inner[i].y * gs);
                ctx.closePath();
                
                ctx.fillStyle = CONFIG.trackColor;
                ctx.fill('evenodd');

                // 4. Skid Marks clipped
                ctx.save();
                ctx.clip('evenodd');
                    if (this.skidMarks.length > 0) {
                        ctx.fillStyle = CONFIG.skidColor;
                        for(let m of this.skidMarks) {
                            ctx.save();
                            ctx.translate(m.x * gs, m.y * gs);
                            ctx.rotate(m.angle);
                            ctx.fillRect(-10, -5, 4, 10);
                            ctx.fillRect(-10, 5, 4, 10);
                            ctx.restore();
                        }
                    }
                ctx.restore();

                // 6. Draw Curbs
                const drawCurb = (poly) => {
                    ctx.lineWidth = 6;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    ctx.setLineDash([20, 20]);
                    
                    // Red
                    ctx.strokeStyle = CONFIG.curbRed;
                    ctx.beginPath();
                    ctx.moveTo(poly[0].x * gs, poly[0].y * gs);
                    for(let i=1; i<poly.length; i++) ctx.lineTo(poly[i].x * gs, poly[i].y * gs);
                    ctx.closePath();
                    ctx.stroke();

                    // White
                    ctx.lineDashOffset = 20;
                    ctx.strokeStyle = CONFIG.curbWhite;
                    ctx.stroke();
                    
                    ctx.setLineDash([]);
                    ctx.lineDashOffset = 0;
                    
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                };

                drawCurb(this.activeGeometry.outer);
                drawCurb(this.activeGeometry.inner);

                // 6.5 Draw Tire Barriers (Sparse)
                const drawTires = (poly) => {
                    const step = 20; 
                    for(let i=0; i<poly.length; i+=step) {
                        const p = poly[i];
                        const px = p.x * gs;
                        const py = p.y * gs;

                        const offsets = [{x:0, y:0}, {x:6, y:4}, {x:-6, y:4}];
                        for(let o of offsets) {
                            ctx.fillStyle = '#171717';
                            ctx.beginPath(); ctx.arc(px + o.x, py + o.y, 5, 0, Math.PI*2); ctx.fill();
                            
                            ctx.strokeStyle = (i % (step*2) === 0) ? CONFIG.curbRed : CONFIG.curbWhite;
                            ctx.lineWidth = 2;
                            ctx.beginPath(); ctx.arc(px + o.x, py + o.y, 2.5, 0, Math.PI*2); ctx.stroke();
                        }
                    }
                };
                
                drawTires(this.activeGeometry.outer);

                // 7. Start Line
                const sl = this.currentTrack.startLine;
                ctx.beginPath();
                ctx.strokeStyle = CONFIG.finishLineColor;
                ctx.lineWidth = 8;
                ctx.setLineDash([8, 8]);
                ctx.moveTo(sl.p1.x * gs, sl.p1.y * gs);
                ctx.lineTo(sl.p2.x * gs, sl.p2.y * gs);
                ctx.stroke();
                ctx.setLineDash([]);

                // 8. Particles
                for (let p of this.particles) {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / p.maxLife;
                    ctx.beginPath();
                    ctx.arc(p.x * gs, p.y * gs, p.size, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;

                // 9. Player F1 Car
                const px = this.pos.x * gs;
                const py = this.pos.y * gs;
                ctx.save();
                ctx.translate(px, py);
                ctx.rotate(this.angle);
                
                const scale = 1.0; 
                ctx.drawImage(this.carSprite, -32*scale, -16*scale, 64*scale, 32*scale);

                ctx.restore();

                // 10. Speed Lines
                const speed = Math.sqrt(this.velocity.x**2 + this.velocity.y**2);
                if (speed > 4 && this.status === 'playing') {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    const vx = -this.velocity.x * 2;
                    const vy = -this.velocity.y * 2;
                    for(let k=0; k<5; k++) {
                        const rx = this.pos.x * gs + (Math.random()-0.5)*200;
                        const ry = this.pos.y * gs + (Math.random()-0.5)*200;
                        ctx.moveTo(rx, ry);
                        ctx.lineTo(rx + vx, ry + vy);
                    }
                    ctx.stroke();
                }

                ctx.restore();
            }

            loop(now) {
                const dt = Math.min((now - this.lastTime) / 1000, 0.1);
                this.lastTime = now;
                this.update(dt);
                if (this.status === 'playing') {
                    this.uiTime.innerText = this.currentTime.toFixed(2);
                    const speed = Math.sqrt(this.velocity.x**2 + this.velocity.y**2);
                    this.uiSpeed.innerText = Math.round(speed * 20); 
                }
                this.render();
                requestAnimationFrame((t) => this.loop(t));
            }
        }

        const game = new RealTimeRacer();

    </script>
</body>
