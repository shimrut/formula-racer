<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (location.hostname === 'vectorgp.run') {
            const s = document.createElement('script');
            s.defer = true;
            s.src = 'https://cloud.umami.is/script.js';
            s.dataset.websiteId = 'd61b5069-df2c-4e9b-a7d2-125c7fb7c760';
            document.head.appendChild(s);
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vector Grand Prix: Formula Racing Simulator</title>
    <meta name="description"
        content="Vector Grand Prix: A high-stakes formula racing simulator. Master the physics of speed on challenging circuits in this precision-based vector racing game. Compete for the fastest lap times on every track.">
    <meta name="keywords"
        content="formula racing, grand prix game, vector racing, physics-based racing, circuit driver, retro racer, browser game, high speed racing, lap time challenge, global circuits">
    <meta name="author" content="Vector Grand Prix Team">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://vectorgp.run/">
    <meta property="og:title" content="Vector Grand Prix: Formula Racing Simulator">
    <meta property="og:description"
        content="High-stakes vector formula racing. Master the circuits and set the ultimate lap time.">
    <meta property="og:image" content="https://vectorgp.run/social-preview.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://vectorgp.run/">
    <meta property="twitter:title" content="Vector Grand Prix: Formula Racing Simulator">
    <meta property="twitter:description"
        content="High-stakes vector formula racing. Master the circuits and set the ultimate lap time.">
    <meta property="twitter:image" content="https://vectorgp.run/social-preview.png">

    <link rel="canonical" href="https://vectorgp.run/">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Vector Grand Prix",
      "operatingSystem": "Web",
      "applicationCategory": "GameApplication",
      "genre": "Racing Game",
      "description": "A precision-based vector racing game focused on formula racing mechanics and high-speed circuit mastery.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
</head>

<body>

    <header>
        <h1>Vector <span class="full-name">Grand Prix</span><span class="short-name" style="display: none;">GP</span>
        </h1>

        <div class="header-right">
            <button id="header-htp-btn" class="text-link-btn" type="button"
                style="margin-top: 0; color: #fff; text-decoration: none; font-weight: bold;">
                <span class="htp-text">How to Play</span>
                <span class="htp-icon" style="display: none;">?</span>
            </button>
            <!-- Collapsible Controls -->
            <div class="header-controls" id="header-controls">
                <select id="track-select">
                    <option value="circuit">Classic Circuit</option>
                    <option value="sunlitTemple" hidden>Sunlit Temple</option>
                    <option value="royalPlateau" hidden>Royal Plateau</option>
                    <option value="mistwoodSerpent" hidden>Mistwood Serpent</option>
                    <option value="harborParkLoop">Harbor Park Loop</option>
                    <option value="jadeSpiralCircuit" hidden>Jade Spiral Circuit</option>
                </select>
            </div>
        </div>
    </header>

    <div id="game-container">
        <!-- Stats HUD Overlay -->
        <div class="stats">
            <div class="stat-item">LAP: <span id="time-val">0.00</span></div>
            <div class="stat-item">KPH: <span id="speed-val">0</span></div>
            <div class="stat-item" id="best-time-display" style="display: none;">BEST: <span
                    id="best-time-val">--</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <div class="key-hint">
            A / D or Arrows to Steer
            <span class="version-label">v 0.21</span>
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-overlay">
            <button id="start-btn">Start Your Engines</button>
        </div>

        <!-- F1 Lights (3 Steps) -->
        <div id="start-lights">
            <div class="light" id="light-1"></div>
            <div class="light" id="light-2"></div>
            <div class="light" id="light-3"></div>
        </div>

        <!-- Big GO Text -->
        <div id="go-message">GO!</div>

        <!-- Mobile Touch Controls (Steering Only) -->
        <div class="mobile-controls">
            <div class="control-group">
                <div id="btn-left" class="touch-btn">←</div>
                <div id="btn-right" class="touch-btn">→</div>
            </div>
        </div>
    </div>



    <div id="modal" class="modal">
        <div class="modal-card">
            <div id="modal-main-view" class="modal-view active-view">
                <h2 id="modal-title">CRASH</h2>
                <p id="modal-msg">Terminal Damage</p>

                <div id="modal-best-time" class="modal-best-time" style="display: none;"></div>

                <div id="share-panel" class="share-panel">
                    <button id="share-btn" type="button">Challenge a Friend</button>
                </div>

                <button id="modal-reset-btn">Box Box <kbd class="modal-btn-kbd">R</kbd></button>
                <button id="view-runs-btn" class="text-link-btn" type="button" style="display: none;">View Last 10
                    Runs</button>
            </div>

            <div id="modal-runs-view" class="modal-view">
                <h3 class="modal-subtitle">Last 10 Runs</h3>
                <div id="modal-lap-times" class="modal-lap-times-container"></div>
                <button id="back-to-main-btn" class="text-link-btn" type="button">Back</button>
            </div>
        </div>
    </div>

    <!-- How To Play Modal -->
    <div id="how-to-play-modal" class="modal">
        <div class="modal-card">
            <h2 style="font-size: 2.5rem;">How to Play</h2>
            <div class="htp-instructions">
                <p>🏎️ The car accelerates on its own.</p>
                <p>🕹️ Use A/D or the Arrows to steer.</p>
                <p>🏁 End a run without crashing into the walls.</p>
            </div>
            <button id="close-htp-btn"
                style="width: 100%; margin-top: 1rem; padding: 1rem; background: var(--accent-color); color: white; border: none; border-radius: 4px; font-weight: 800; text-transform: uppercase; cursor: pointer;">Got
                it</button>
        </div>
    </div>

    <script type="module" src="game/index.js?v=0.2"></script>
</body>

</html>
