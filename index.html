<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="d61b5069-df2c-4e9b-a7d2-125c7fb7c760"></script>
    <title>Vector Racer: Grand Prix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Vector <span>Grand Prix</span></h1>
        
        <div class="header-right">

            <!-- Hamburger Button -->
            <button id="menu-toggle">☰</button>

            <!-- Collapsible Controls -->
            <div class="header-controls" id="header-controls">
                <div class="settings-group">
                    <label>
                        <input type="checkbox" id="toggle-route" checked> Trace Route
                    </label>
                </div>
                <select id="track-select">
                    <option value="circuit">Classic Circuit</option>
                    <option value="sunlitTemple" hidden>Sunlit Temple</option>
                    <option value="royalPlateau" hidden>Royal Plateau</option>
                    <option value="mistwoodSerpent" hidden>Mistwood Serpent</option>
                    <option value="harborParkLoop">Harbor Park Loop</option>
                </select>
            </div>
        </div>
    </header>

    <div id="game-container">
        <!-- Stats HUD Overlay -->
        <div class="stats">
            <div class="stat-item">LAP: <span id="time-val">0.00</span></div>
            <div class="stat-item">KPH: <span id="speed-val">0</span></div>
            <div class="stat-item" id="best-time-display" style="display: none;">BEST: <span id="best-time-val">--</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>
        <div class="key-hint">
            A / D or Arrows to Steer
        </div>

        <!-- Start Screen Overlay -->
        <div id="start-overlay">
            <button id="start-btn">Start Your Engines</button>
        </div>

        <!-- F1 Lights (3 Steps) -->
        <div id="start-lights">
            <div class="light" id="light-1"></div>
            <div class="light" id="light-2"></div>
            <div class="light" id="light-3"></div>
        </div>
        
        <!-- Big GO Text -->
        <div id="go-message">GO!</div>

        <!-- Mobile Touch Controls (Steering Only) -->
        <div class="mobile-controls">
            <div class="control-group">
                <div id="btn-left" class="touch-btn">←</div>
                <div id="btn-right" class="touch-btn">→</div>
            </div>
        </div>
    </div>



    <div id="modal" class="modal">
        <div class="modal-card">
            <h2 id="modal-title">CRASH</h2>
            <p id="modal-msg">Terminal Damage</p>
            <div id="modal-lap-times" class="modal-lap-times"></div>
            <button id="modal-reset-btn">Box Box <kbd class="modal-btn-kbd">R</kbd></button>
            
            <div class="modal-track-selector">
                <label>Next Grand Prix</label>
                <select id="modal-track-select">
                <option value="circuit">Classic Circuit</option>
                <option value="sunlitTemple" hidden>Sunlit Temple</option>
                <option value="royalPlateau" hidden>Royal Plateau</option>
                <option value="mistwoodSerpent" hidden>Mistwood Serpent</option>
                <option value="harborParkLoop">Harbor Park Loop</option>
            </select>
            </div>
        </div>
    </div>

    <script type="module" src="game/index.js"></script>
</body>
</html>
